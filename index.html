var favorites = JSON.parse(localStorage.getItem('favs') || '[]');
function renderTools(){
  var q = (document.getElementById('searchInput').value || '').toLowerCase();
  var cat = (document.querySelector('.cat.on')?.dataset.cat) || 'all';
  var grid = document.getElementById('toolGrid');
  var html = '';

    if(q && !t.name.includes(q) && !t.desc.includes(q) && !(t.tags.some(function(tg){return tg.includes(q);}))) continue;

function setCat(el){

function toggleFav(id){
  var i = favorites.indexOf(id);
  if(i > -1) favorites.splice(i,1); else favorites.push(id);
  localStorage.setItem('favs', JSON.stringify(favorites));
  renderTools();
}
var savedTheme = localStorage.getItem('theme');
if(savedTheme) document.documentElement.setAttribute('data-theme', savedTheme);
function toggleTheme(){
  var d = document.documentElement;
  var next = d.getAttribute('data-theme') === 'dark' ? '' : 'dark';
  d.setAttribute('data-theme', next);
  localStorage.setItem('theme', next);
  document.getElementById('themeBtn').textContent = next === 'dark' ? '☀️' : '🌙';
}
document.getElementById('themeBtn').textContent = savedTheme === 'dark' ? '☀️' : '🌙';

  for(var i=0;i<TOOLS.length;i++){if(TOOLS[i].id===id){tool=TOOLS[i];break;}}

  document.getElementById('panelTitle').textContent = tool.icon + ' ' + tool.name;

}
function copyText(txt){
  if(navigator.clipboard){
    navigator.clipboard.writeText(txt).then(function(){showToast('✅ 已复制');}).catch(function(){fallbackCopy(txt);});
  } else { fallbackCopy(txt); }
}
function fallbackCopy(txt){
  var ta = document.createElement('textarea');
  ta.value = txt; document.body.appendChild(ta); ta.select(); document.execCommand('copy');
  document.body.removeChild(ta); showToast('✅ 已复制');
}

// Tool 1: Image Compressor
function renderImgCompress(){
  document.getElementById('panelBody').innerHTML = 
    '<div class="drop-zone" id="imgDrop"><p>📁 拖拽图片到此处，或点击选择文件</p><p style="font-size:12px;color:var(--text3);margin-top:4px">支持 PNG / JPG / WebP</p></div>' +
    '<input type="file" id="imgFileInput" accept="image/png,image/jpeg,image/webp" multiple style="display:none">' +
    '<div class="form-group"><label>压缩质量：<span id="qualityVal">80</span>%</label><input type="range" id="qualitySlider" min="10" max="100" value="80" oninput="document.getElementById(\'qualityVal\').textContent=this.value"></div>' +
    '<div class="form-group"><label>输出格式</label><select id="imgFormat"><option value="image/jpeg">JPEG</option><option value="image/png">PNG</option><option value="image/webp">WebP</option></select></div>' +
    '<div style="display:flex;gap:8px;flex-wrap:wrap" id="imgResults"></div>';
  document.getElementById('imgDrop').onclick = function(){document.getElementById('imgFileInput').click();};
  document.getElementById('imgFileInput').onchange = function(){handleImgFiles(this.files);};
}
function handleImgFiles(files){
  var q = parseInt(document.getElementById('qualitySlider').value) || 80;
  var fmt = document.getElementById('imgFormat').value || 'image/jpeg';
  var res = document.getElementById('imgResults');
  res.innerHTML = '';
  for(var fi = 0; fi < files.length; fi++){
    (function(file){
      var reader = new FileReader();
      reader.onload = function(e){
        var img = new Image();
        img.onload = function(){
          var c = document.createElement('canvas');
          c.width = img.naturalWidth; c.height = img.naturalHeight;
          c.getContext('2d').drawImage(img, 0, 0);
          c.toBlob(function(blob){
            var url = URL.createObjectURL(blob);
            var savings = ((1 - blob.size / file.size) * 100).toFixed(1);
            var div = document.createElement('div');
            div.style.cssText = 'background:var(--card);border:1px solid var(--bd);border-radius:10px;padding:12px;width:calc(50% - 4px);min-width:200px';
            var ext = fmt.split('/')[1];
            var fname = 'compressed_' + file.name.replace(/\.[^.]+$/, '') + '.' + ext;
            div.innerHTML = '<img src="'+url+'" style="width:100%;border-radius:6px"><div style="margin-top:8px;font-size:13px"><div>📄 '+file.name+'</div><div>📦 '+(file.size/1024).toFixed(1)+'KB → '+(blob.size/1024).toFixed(1)+'KB</div><div style="color:'+(savings>0?'#10b981':'#ef4444')+';font-weight:600">'+(savings>0?'↓':'↑')+' '+Math.abs(savings)+'%</div></div><button class="btn btn-primary btn-sm" style="margin-top:8px" onclick="downloadFile(\''+url+'\',\''+fname+'\')">⬇️ 下载</button>';
            res.appendChild(div);
          }, fmt, q/100);
        };
        img.src = e.target.result;
      };
      reader.readAsDataURL(file);
    })(files[fi]);
  }
}
function downloadFile(url, name){
  var a = document.createElement('a');
  a.href = url; a.download = name; a.click();
}

function generateQR(){
  var input = document.getElementById('qrInput').value;
  if(!input.trim()){ showToast('⚠️ 请输入内容'); return; }
  var fg = document.getElementById('qrFg').value.slice(1);
  var bg = document.getElementById('qrBg').value.slice(1);
  var size = parseInt(document.getElementById('qrSize').value) || 256;
  var level = document.getElementById('qrLevel').value || 'M';
  var url = 'https://api.qrserver.com/v1/create-qr-code/?size='+size+'x'+size+'&data='+encodeURIComponent(input)+'&color='+fg+'&bgcolor='+bg+'&ecc='+level;
  document.getElementById('qrcode').innerHTML = '<img src="'+url+'" alt="QR Code" style="max-width:100%;border-radius:8px" id="qrImg">';
  document.getElementById('qrDownloadBtn').style.display = 'inline-flex';
}
function downloadQR(){
  var img = document.getElementById('qrImg');
  if(img) { var a = document.createElement('a'); a.href = img.src; a.download = 'qrcode.png'; a.click(); }
}

function renderPalette(){
  document.getElementById('panelBody').innerHTML = 
    '<div class="drop-zone" id="palDrop"><p>🎨 点击选择图片，提取主色调</p></div>' +
    '<input type="file" id="palInput" accept="image/*" style="display:none">' +
    '<div id="palResults"></div>';
  document.getElementById('palDrop').onclick = function(){document.getElementById('palInput').click();};
  document.getElementById('palInput').onchange = function(){
    var file = this.files[0];
    if(!file) return;
    var reader = new FileReader();
    reader.onload = function(e){
      var img = new Image();
      img.onload = function(){
        var c = document.createElement('canvas');
        c.width = 100; c.height = 100;
        c.getContext('2d').drawImage(img, 0, 0, 100, 100);
        var data = c.getContext('2d').getImageData(0,0,100,100).data;
        var colors = [];
        for(var y=0;y<100;y+=5) for(var x=0;x<100;x+=5){
          var pi = (y*100+x)*4;
          colors.push([data[pi],data[pi+1],data[pi+2]]);
        }
        var k = 5, centroids = [];
        for(var ci=0;ci<k;ci++) centroids.push(colors[Math.floor(Math.random()*colors.length)]);
        for(var iter=0;iter<20;iter++){
          var clusters = [[],[],[],[],[]];
          for(var pi2=0;pi2<colors.length;pi2++){
            var p = colors[pi2], minD = Infinity, best = 0;
            for(var ci2=0;ci2<k;ci2++){
              var d = (p[0]-centroids[ci2][0])**2 + (p[1]-centroids[ci2][1])**2 + (p[2]-centroids[ci2][2])**2;
              if(d < minD){ minD = d; best = ci2; }
            }
            clusters[best].push(p);
          }
          for(var ci3=0;ci3<k;ci3++) if(clusters[ci3].length){
            centroids[ci3] = [Math.round(clusters[ci3].reduce(function(s,pi3){return s+pi3[0];},0)/clusters[ci3].length),Math.round(clusters[ci3].reduce(function(s,pi3){return s+pi3[1];},0)/clusters[ci3].length),Math.round(clusters[ci3].reduce(function(s,pi3){return s+pi3[2];},0)/clusters[ci3].length)];
          }
        }
        var counts = centroids.map(function(cent, idx){
          return {c:cent, count: colors.filter(function(px){
            var minD2 = Infinity, best2 = 0;
            for(var j=0;j<k;j++){ var dd = (px[0]-centroids[j][0])**2 + (px[1]-centroids[j][1])**2 + (px[2]-centroids[j][2])**2; if(dd < minD2){ minD2 = dd; best2 = j; } }
            return best2 === idx;
          }).length};
        });
        counts.sort(function(a,b){return b.count - a.count;});
        var h = '<div style="margin-bottom:12px"><img src="'+e.target.result+'" style="max-width:200px;border-radius:8px"></div><div style="display:flex;gap:8px;flex-wrap:wrap">';
        for(var qi=0;qi<counts.length;qi++){
          var hex = '#' + counts[qi].c.map(function(v){return v.toString(16).padStart(2,'0');}).join('');
          h += '<div style="text-align:center"><div class="color-swatch" style="background:'+hex+';width:48px;height:48px;border-radius:10px" onclick="copyText(\''+hex+'\')" title="点击复制 '+hex+'"></div><div style="font-size:11px;margin-top:4px;color:var(--text3)">'+hex+'</div></div>';
        }
        h += '</div><p style="font-size:12px;color:var(--text3);margin-top:8px">👆 点击色块复制色值</p>';
        document.getElementById('palResults').innerHTML = h;
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  };
}

var b64Mode = 'encode';
function renderBase64(){
  document.getElementById('panelBody').innerHTML = 
    '<div style="display:flex;gap:8px;margin-bottom:12px"><button class="btn btn-primary btn-sm" id="b64EncBtn" onclick="switchB64(\'encode\')">🔐 编码</button><button class="btn btn-sm" id="b64DecBtn" onclick="switchB64(\'decode\')">🔓 解码</button></div>' +
    '<div class="drop-zone" id="b64Drop"><p>📎 拖拽文件编码为Base64</p></div><input type="file" id="b64FileInput" style="display:none">' +
    '<div class="form-group"><label id="b64Label">输入文本</label><textarea id="b64Input" rows="4" placeholder="在此输入文本..."></textarea></div>' +
    '<button class="btn btn-primary btn-sm" onclick="execB64()" style="margin-bottom:12px">▶ 执行</button>' +
    '<div class="form-group"><label>结果</label><div class="result-box" id="b64Result"><span style="color:var(--text3)">等待输入...</span></div><button class="btn btn-sm" onclick="copyResult(\'b64Result\')">📋 复制结果</button></div>';
  document.getElementById('b64Drop').onclick = function(){document.getElementById('b64FileInput').click();};
  document.getElementById('b64FileInput').onchange = function(){
    var file = this.files[0];
    if(!file) return;
    var reader = new FileReader();
    reader.onload = function(e){
      document.getElementById('b64Input').value = e.target.result.split(',')[1] || e.target.result;
      document.getElementById('b64Label').textContent = '输入 (Base64 编码)';
    };
    reader.readAsDataURL(file);
  };
}
function switchB64(mode){
  b64Mode = mode;
  document.getElementById('b64EncBtn').className = mode==='encode' ? 'btn btn-primary btn-sm' : 'btn btn-sm';
  document.getElementById('b64DecBtn').className = mode==='decode' ? 'btn btn-primary btn-sm' : 'btn btn-sm';
  document.getElementById('b64Label').textContent = mode==='encode' ? '输入文本' : '输入Base64';
  document.getElementById('b64Input').placeholder = mode==='encode' ? '在此输入文本...' : '输入Base64编码...';
}
function execB64(){
  var input = document.getElementById('b64Input').value;
  if(!input.trim()){ showToast('⚠️ 请输入内容'); return; }
  var res = document.getElementById('b64Result');
  try {
    if(b64Mode === 'encode') res.textContent = btoa(unescape(encodeURIComponent(input)));
    else res.textContent = decodeURIComponent(escape(atob(input.trim())));
  } catch(e){
    res.innerHTML = '<span style="color:#ef4444">❌ 解码失败：输入不是有效的Base64编码</span>';
  }
}

var unitData = {
  length:{name:'长度',units:['毫米','厘米','分米','米','千米','英寸','英尺','码','英里'],base:['mm','cm','dm','m','km','in','ft','yd','mi'],rates:{mm:1,cm:10,dm:100,m:1000,km:1000000,in:25.4,ft:304.8,yd:914.4,mi:1609344}},
  weight:{name:'重量',units:['毫克','克','千克','吨','盎司','磅'],base:['mg','g','kg','t','oz','lb'],rates:{mg:0.001,g:1,kg:1000,t:1000000,oz:28.3495,lb:453.592}},
  temp:{name:'温度',units:['摄氏度(°C)','华氏度(°F)','开尔文(K)'],base:['c','f','k'],rates:{}},
  area:{name:'面积',units:['平方毫米','平方厘米','平方米','公顷','平方千米','平方英寸','平方英尺','英亩'],base:['mm2','cm2','m2','ha','km2','in2','ft2','ac'],rates:{mm2:1,cm2:100,m2:1e6,ha:1e10,km2:1e12,in2:645.16,ft2:92903.04,ac:4046856422.4}},
  volume:{name:'体积',units:['毫升','升','立方米','加仑(美)','加仑(英)','立方英寸','立方英尺'],base:['ml','l','m3','gal','gal_uk','in3','ft3'],rates:{ml:1,l:1000,m3:1e6,gal:3785.41,gal_uk:4546.09,in3:16.3871,ft3:28316.8}},
  speed:{name:'速度',units:['米/秒','千米/时','英里/时','节','马赫'],base:['m_s','km_h','mph','kn','mach'],rates:{m_s:1,km_h:0.277778,mph:0.44704,kn:0.514444,mach:343}}
};
var currentUnitCat = 'length';
function renderUnitConv(){
  var catBtns = '';
  for(var key in unitData) catBtns += '<button class="btn btn-sm'+(key===currentUnitCat?' btn-primary':'')+'" onclick="switchUnitCat(\''+key+'\')">'+unitData[key].name+'</button>';
  document.getElementById('panelBody').innerHTML = 
    '<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px">'+catBtns+'</div>' +
    '<div class="form-group"><label>数值</label><input type="number" id="ucVal" value="1" oninput="updateUnitConv()"></div>' +
    '<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px"><div class="form-group"><label>从</label><select id="ucFrom" onchange="updateUnitConv()"></select></div><div class="form-group"><label>到</label><select id="ucTo" onchange="updateUnitConv()"></select></div></div>' +
    '<div class="form-group"><label>结果</label><div class="result-box" id="ucResult" style="font-size:18px;font-weight:700;text-align:center">1</div></div>';
  switchUnitCat(currentUnitCat);
}
function switchUnitCat(cat){
  currentUnitCat = cat;
  var data = unitData[cat];
  var fromSel = document.getElementById('ucFrom');
  var toSel = document.getElementById('ucTo');
  var opts1 = '', opts2 = '';
  for(var i=0;i<data.units.length;i++){
    opts1 += '<option value="'+data.base[i]+'">'+data.units[i]+'</option>';
    opts2 += '<option value="'+data.base[i]+'">'+data.units[i]+'</option>';
  }
  fromSel.innerHTML = opts1;
  toSel.innerHTML = opts2;
  if(toSel.options.length > 1) toSel.selectedIndex = 1;
  updateUnitConv();
}
function updateUnitConv(){
  var data = unitData[currentUnitCat];
  var val = parseFloat(document.getElementById('ucVal').value) || 0;
  var from = document.getElementById('ucFrom').value;
  var to = document.getElementById('ucTo').value;
  var result;
  if(currentUnitCat === 'temp'){
    if(from === 'c') result = val;
    else if(from === 'f') result = (val - 32) * 5/9;
    else result = val - 273.15;
    if(to === 'f') result = result * 9/5 + 32;
    else if(to === 'k') result = result + 273.15;
  } else {
    result = val * data.rates[from] / data.rates[to];
  }
  document.getElementById('ucResult').textContent = result.toFixed(4) + ' ' + data.units[data.base.indexOf(to)];
}

function renderTextTransform(){
  document.getElementById('panelBody').innerHTML = 
    '<div class="form-group"><label>输入文本</label><textarea id="ttInput" rows="6" placeholder="输入要转换的文本..."></textarea></div>' +
    '<div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px">' +
    '<button class="btn btn-primary btn-sm" onclick="ttDo(\'upper\')">🔠 大写</button>' +
    '<button class="btn btn-sm" onclick="ttDo(\'lower\')">🔡 小写</button>' +
    '<button class="btn btn-sm" onclick="ttDo(\'capitalize\')">📚 首字母大写</button>' +
    '<button class="btn btn-sm" onclick="ttDo(\'reverse\')">↔️ 反转</button>' +
    '<button class="btn btn-sm" onclick="ttDo(\'trim\')">✂️ 去空格</button>' +
    '<button class="btn btn-sm" onclick="ttDo(\'sort\')">📊 排序行</button>' +
    '<button class="btn btn-sm" onclick="ttDo(\'unique\')">🔀 去重行</button>' +
    '<button class="btn btn-sm" onclick="ttDo(\'camel\')">🐫 驼峰</button>' +
    '<button class="btn btn-sm" onclick="ttDo(\'snake\')">🐍 蛇形</button>' +
    '<button class="btn btn-sm" onclick="ttDo(\'kebab\')">🍢 烤肉串</button></div>' +
    '<div class="form-group"><label>结果</label><div class="result-box" id="ttResult"><span style="color:var(--text3)">等待转换...</span></div><button class="btn btn-sm" onclick="copyResult(\'ttResult\')">📋 复制结果</button></div>';
}
function ttDo(mode){
  var input = document.getElementById('ttInput').value;
  var res = document.getElementById('ttResult');
  if(!input.trim()){ res.innerHTML = '<span style="color:var(--text3)">请输入文本</span>'; return; }
  var f = {
    upper: function(){ return input.toUpperCase(); },
    lower: function(){ return input.toLowerCase(); },
    capitalize: function(){ return input.replace(/\b\w/g, function(c){ return c.toUpperCase(); }); },
    reverse: function(){ return input.split('').reverse().join(''); },
    trim: function(){ return input.replace(/\s+/g, ' ').trim(); },
    sort: function(){ return input.split('\n').sort().join('\n'); },
    unique: function(){ return [...new Set(input.split('\n'))].join('\n'); },
    camel: function(){ return input.replace(/[-_\s]+(.)/g, function(_,c){ return c.toUpperCase(); }).replace(/^[A-Z]/, function(c){ return c.toLowerCase(); }); },
    snake: function(){ return input.replace(/([A-Z])/g,'_$1').toLowerCase().replace(/^_/,'').replace(/[-\s]+/g,'_'); },
    kebab: function(){ return input.replace(/([A-Z])/g,'-$1').toLowerCase().replace(/^-/,'').replace(/[_\s]+/g,'-'); }
  };
  res.textContent = (f[mode] || function(){ return input; })();
}

    '<div style="margin-top:14px"><label style="font-size:13px;font-weight:600;color:var(--text2)">相似色 / 互补色</label><div class="color-swatches" id="cpRelated"></div></div>';
  document.getElementById('cpColor').addEventListener('input', updateCP);
  updateCP();

function updateCP(){
  var hex = document.getElementById('cpColor').value;
  var r = parseInt(hex.slice(1,3), 16), g = parseInt(hex.slice(3,5), 16), b = parseInt(hex.slice(5,7), 16);
  document.getElementById('cpPreview').style.background = hex;
  document.getElementById('cpHex').textContent = hex;
  document.getElementById('cpRgb').textContent = 'rgb('+r+','+g+','+b+')';
  var mr=r/255, mg=g/255, mb=b/255, max=Math.max(mr,mg,mb), min=Math.min(mr,mg,mb), l=(max+min)/2;
  var h=0, s=0;
  if(max !== min){
    var d = max - min;
    s = l > 0.5 ? d/(2-max-min) : d/(max+min);
    if(max === mr) h = ((mg-mb)/d + (mg<mb?6:0))/6;
    else if(max === mg) h = ((mb-mr)/d + 2)/6;
    else h = ((mr-mg)/d + 4)/6;
  }
  document.getElementById('cpHsl').textContent = 'hsl('+(h*360|0)+','+(s*100|0)+'%,'+(l*100|0)+'%)';
  var related = ['#'+((255-r)<<16|(255-g)<<8|(255-b)).toString(16).padStart(6,'0'),'#'+(((r+128)%255)<<16|((g+128)%255)<<8|((b+128)%255)).toString(16).padStart(6,'0'),'#'+((g<<16|b<<8|r)).toString(16).padStart(6,'0'),'#'+((b<<16|r<<8|g)).toString(16).padStart(6,'0')];
  document.getElementById('cpRelated').innerHTML = related.map(function(c){ return '<div class="color-swatch" style="background:'+c+'" onclick="copyText(\''+c+'\')" title="点击复制 '+c+'"></div>'; }).join('');
}
